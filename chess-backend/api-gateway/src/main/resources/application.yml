server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Lấy tên miền từ biến môi trường FRONTEND_URL, nếu không có thì mặc định cho phép localhost
            allowedOriginPatterns: "${FRONTEND_URL:http://localhost:5173}" 
            allowedMethods: "*"
            allowedHeaders: "*"
            allowedCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # Sử dụng lb:// (Load Balancer) để gọi qua Eureka thay vì gọi localhost
        - id: game-service-ws
          uri: lb://GAME-SERVICE
          predicates:
            - Path=/ws/game/**
            
        - id: game-service-api
          uri: lb://GAME-SERVICE
          predicates:
            - Path=/api/games/**
            
        - id: user-service-api
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**, /api/auth/**
            
        - id: course-service-api
          uri: lb://COURSE-SERVICE
          predicates:
            - Path=/api/courses/**
            
        - id: payment-service-api
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**
            
        - id: notification-service-api
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      # Sử dụng biến môi trường cho Eureka, mặc định là localhost cho dev
      defaultZone: "${EUREKA_URI:http://localhost:8761/eureka/}"
